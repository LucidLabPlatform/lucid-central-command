name: lucid-central-command

services:
  db:
    container_name: lucid-db
    build: ./lucid-infra/lucid-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - lucid_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  auth:
    container_name: lucid-auth
    build: ./lucid-infra/lucid-auth
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      EMQX_URL: http://emqx:18083
      EMQX_USERNAME: ${EMQX_API_USERNAME}
      EMQX_PASSWORD: ${EMQX_API_PASSWORD}
      BOOTSTRAP_CC_USER: ${LUCID_MQTT_USERNAME}
      BOOTSTRAP_CC_PASSWORD: ${LUCID_MQTT_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/health', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      emqx:
        condition: service_started

  emqx:
    container_name: lucid-emqx
    build: ./lucid-infra/lucid-emqx
    restart: unless-stopped
    environment:
      EMQX_NAME: emqx
      EMQX_HOST: emqx
      EMQX_DASHBOARD__DEFAULT_USERNAME: ${EMQX_API_USERNAME}
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_API_PASSWORD}
      EMQX_ALLOW_ANONYMOUS: "false"
      EMQX_AUTHENTICATION__1__MECHANISM: password_based
      EMQX_AUTHENTICATION__1__BACKEND: built_in_database
      EMQX_AUTHENTICATION__2__MECHANISM: password_based
      EMQX_AUTHENTICATION__2__BACKEND: ldap
      EMQX_AUTHENTICATION__2__METHOD__TYPE: bind
      EMQX_AUTHENTICATION__2__METHOD__BIND_PASSWORD: $${password}
      EMQX_AUTHENTICATION__2__SERVER: '"${LDAP_SERVER:-}"'
      EMQX_AUTHENTICATION__2__USERNAME: '"${LDAP_BIND_USERNAME:-}"'
      EMQX_AUTHENTICATION__2__PASSWORD: '"${LDAP_BIND_PASSWORD:-}"'
      EMQX_AUTHENTICATION__2__BASE_DN: '"${LDAP_BASE_DN:-}"'
      EMQX_AUTHENTICATION__2__FILTER: '"${LDAP_FILTER:-}"'
      EMQX_AUTHENTICATION__2__QUERY_TIMEOUT: 5s
      EMQX_AUTHORIZATION__NO_MATCH: deny
      EMQX_AUTHORIZATION__SOURCES__1__TYPE: built_in_database
      EMQX_AUTHORIZATION__SOURCES__1__ENABLE: "true"
    ports:
      - "1883:1883"
      - "18083:18083"
    volumes:
      - emqx_data:/opt/emqx/data

  emqx-provisioner:
    container_name: lucid-emqx-provisioner
    build:
      context: ./lucid-infra/lucid-emqx
      dockerfile: Provisioner.Dockerfile
    restart: on-failure
    environment:
      EMQX_URL: http://emqx:18083
      EMQX_USERNAME: ${EMQX_API_USERNAME}
      EMQX_PASSWORD: ${EMQX_API_PASSWORD}
      LUCID_DB_HOST: lucid-db:5432
      LUCID_DB_NAME: ${POSTGRES_DB}
      LUCID_DB_USER: ${POSTGRES_USER}
      LUCID_DB_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
      emqx:
        condition: service_started
      lucid-orchestrator:
        condition: service_healthy

  lucid-orchestrator:
    container_name: lucid-orchestrator
    build: ./lucid-orchestrator
    restart: unless-stopped
    environment:
      LUCID_MQTT_HOST: emqx
      LUCID_MQTT_PORT: "1883"
      LUCID_MQTT_USERNAME: ${LUCID_MQTT_USERNAME}
      LUCID_MQTT_PASSWORD: ${LUCID_MQTT_PASSWORD}
      LUCID_DB_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      EMQX_API_URL: http://emqx:18083/api/v5
      EMQX_API_USERNAME: ${EMQX_API_USERNAME}
      EMQX_API_PASSWORD: ${EMQX_API_PASSWORD}
      LUCID_AUTH_URL: http://auth:4000
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_healthy
      emqx:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  lucid-ui:
    container_name: lucid-ui
    build: ./lucid-ui
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      ORCHESTRATOR_URL: http://lucid-orchestrator:5000
      AI_URL: ${AI_URL:-http://lucid-ai:5000}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
      SESSION_SECRET: ${SESSION_SECRET}
      LDAP_URL: ${LDAP_URL:-}
      LDAP_BIND_DN_TEMPLATE: ${LDAP_BIND_DN_TEMPLATE:-}
      LUCID_UI_ENABLE_EXPERIMENTS: "true"
      LUCID_UI_ENABLE_AI: ${LUCID_UI_ENABLE_AI:-true}
      VOICE_URL: ${VOICE_URL:-http://lucid-voice:5100}
    depends_on:
      lucid-orchestrator:
        condition: service_healthy
      lucid-ai:
        condition: service_healthy

  lucid-ai:
    container_name: lucid-ai
    build: ./lucid-ai
    restart: unless-stopped
    environment:
      LUCID_DB_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      LUCID_FLEET_CORE_URL: http://lucid-orchestrator:5000
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      AI_MAX_ITERATIONS: ${AI_MAX_ITERATIONS}
      AI_CHAT_TIMEOUT: ${AI_CHAT_TIMEOUT}
    depends_on:
      db:
        condition: service_healthy
      lucid-orchestrator:
        condition: service_healthy
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  lucid-voice:
    container_name: lucid-voice
    build: ./lucid-voice
    restart: unless-stopped
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL:-base.en}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cpu}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-int8}
      PIPER_MODEL: ${PIPER_MODEL:-en_US-lessac-medium}
      PIPER_MODEL_DIR: /models/piper
    volumes:
      - voice_models:/models
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5100/health', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  ollama:
    container_name: ollama
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  lucid_db_data:
    name: lucid-db-data
  emqx_data:
    name: emqx-data
  ollama_data:
  voice_models:
    name: lucid-voice-models
