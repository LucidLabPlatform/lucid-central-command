# Optional GPU-dependent services (lucid-ai, lucid-voice, ollama).
# Run alongside the core stack with:
#   docker compose -f compose.yaml -f compose.gpu.yaml up -d
# Skip on hosts without GPU resources.
name: lucid-central-command

services:
  lucid-ai:
    container_name: lucid-ai
    build: ./lucid-ai
    restart: unless-stopped
    environment:
      LUCID_DB_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      LUCID_FLEET_CORE_URL: http://lucid-orchestrator:5000
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      AI_MAX_ITERATIONS: ${AI_MAX_ITERATIONS}
      AI_CHAT_TIMEOUT: ${AI_CHAT_TIMEOUT}
    depends_on:
      db:
        condition: service_healthy
      lucid-orchestrator:
        condition: service_healthy
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  lucid-voice:
    container_name: lucid-voice
    build: ./lucid-voice
    restart: unless-stopped
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL:-base.en}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cpu}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-int8}
      PIPER_MODEL: ${PIPER_MODEL:-en_US-lessac-medium}
      PIPER_MODEL_DIR: /models/piper
    volumes:
      - voice_models:/models
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5100/health', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  ollama:
    container_name: ollama
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Re-extend lucid-ui to surface the optional services when this overlay is used.
  lucid-ui:
    environment:
      AI_URL: ${AI_URL:-http://lucid-ai:5000}
      LUCID_UI_ENABLE_AI: ${LUCID_UI_ENABLE_AI:-true}
      VOICE_URL: ${VOICE_URL:-http://lucid-voice:5100}
    depends_on:
      lucid-ai:
        condition: service_healthy
      lucid-voice:
        condition: service_started

volumes:
  ollama_data:
  voice_models:
    name: lucid-voice-models
